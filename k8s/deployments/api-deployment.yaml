apiVersion: apps/v1
kind: Deployment
metadata:
  name: metaflow-api
  namespace: metaflow
  labels:
    app: metaflow-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metaflow-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: metaflow-api
    spec:
      containers:
      - name: api
        image: ghcr.io/your-org/metaflow-api:latest
        ports:
        - containerPort: 8080
          protocol: TCP
        envFrom:
        - configMapRef:
            name: api-config
        - secretRef:
            name: metaflow-secrets
        env:
        - name: EmailService__BaseUrl
          value: "http://email-service:8080"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Always
