apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: metaflow
  labels:
    app: metaflow-api
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  Supabase__Url: "https://your-project.supabase.co"
  Redis__InstanceName: "metaflow:"
  AllowedHosts: "*"
