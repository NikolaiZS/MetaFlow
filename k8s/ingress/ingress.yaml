apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metaflow-ingress
  namespace: metaflow
  labels:
    app: metaflow
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.metaflow.com
    - app.metaflow.com
    secretName: metaflow-tls
  rules:
  - host: api.metaflow.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 80
  - host: app.metaflow.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-service
            port:
              number: 80
