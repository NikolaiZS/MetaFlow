apiVersion: v1
kind: Secret
metadata:
  name: metaflow-secrets
  namespace: metaflow
type: Opaque
stringData:
  # Base64 encoded значения (в реальности используйте sealed secrets)
  POSTGRES_PASSWORD: "your-secure-password"
  JWT_SECRET: "your-jwt-secret-at-least-32-chars-long"
  SMTP_PASSWORD: "your-smtp-password"
  REDIS_PASSWORD: "your-redis-password"
  SUPABASE_SERVICE_KEY: "your-supabase-service-key"
  SUPABASE_CONNECTION_STRING: "Host=your-project.supabase.co;Port=5432;Database=postgres;Username=postgres;Password=your-password"
  REDIS_CONNECTION_STRING: "your-redis-host:6379,password=your-password,ssl=true"
